server {
    listen 80;
    server_name ERP.VjSoftEdge.com erp.vjsoftedge.com;

    root /usr/share/nginx/html;
    index index.html;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /api/auth/ {
        proxy_pass http://${AUTH_UPSTREAM};
    }

    location /api/platform/ {
        proxy_pass http://${PLATFORM_UPSTREAM};
    }

    location /api/catalog/ {
        proxy_pass http://${CATALOG_UPSTREAM};
    }

    location ~ ^/api/(categories|suppliers|products)(/.*)?$ {
        proxy_pass http://${CATALOG_UPSTREAM};
    }

    location /api/inventory/ {
        proxy_pass http://${INVENTORY_UPSTREAM};
    }

    location ~ ^/api/(customers|orders|projects)(/.*)?$ {
        proxy_pass http://${SALES_UPSTREAM};
    }

    location /api/service-desk/ {
        proxy_pass http://${SALES_UPSTREAM};
    }

    location /api/billing/ {
        proxy_pass http://${BILLING_UPSTREAM};
    }

    location /api/finance/ {
        proxy_pass http://${BILLING_UPSTREAM};
    }

    location /api/reporting/ {
        proxy_pass http://${BILLING_UPSTREAM};
    }

    location = /api/anomalies {
        proxy_pass http://${BILLING_UPSTREAM};
    }

    location /api/payments/ {
        proxy_pass http://${PAYMENTS_UPSTREAM};
    }

    location /api/invoices {
        proxy_pass http://${INVOICES_UPSTREAM};
    }

    location /api/invoices/ {
        proxy_pass http://${INVOICES_UPSTREAM};
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
